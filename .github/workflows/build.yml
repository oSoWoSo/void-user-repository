name: matrix build

on:
  push:
    paths:
      - 'srcpkgs/**'
  pull_request:
    paths:
      - 'srcpkgs/**'
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      all:
        description: 'Rebuild everything'
        required: false
        default: false
        type: boolean
      templates:
        description: 'Build multiple packages'
        required: false
        type: string
      template:
        description: 'Build single package'
        required: false
        type: choice
        options:
        -
        - Vish
        - aquamarine
        - brow6el
        - btrfs-progs
        - corekeyboard
        - cosmic-applets
        - cosmic-applibrary
        - cosmic-bg
        - cosmic-comp
        - cosmic-desktop-full
        - cosmic-desktop-minimal
        - cosmic-edit
        - cosmic-files
        - cosmic-greeter
        - cosmic-icons
        - cosmic-idle
        - cosmic-initial-setup
        - cosmic-launcher
        - cosmic-notifications
        - cosmic-osd
        - cosmic-panel
        - cosmic-player
        - cosmic-randr
        - cosmic-screenshot
        - cosmic-session
        - cosmic-settings
        - cosmic-settings-daemon
        - cosmic-term
        - cosmic-theme-editor
        - cosmic-wallpapers
        - cosmic-workspaces-epoch
        - desktop-tui
        - drako
        - gh-lazy
        - glaze
        - gofer
        - hyprcursor
        - hyprdynamicmonitors
        - hyprgraphics
        - hypridle
        - hyprland
        - hyprland-devel
        - hyprland-guiutils
        - hyprland-protocols
        - hyprland-qt-support
        - hyprlang
        - hyprlock
        - hyprpaper
        - hyprpicker
        - hyprpolkitagent
        - hyprsunset
        - hyprsysteminfo
        - hyprtoolkit
        - hyprutils
        - hyprwayland-scanner
        - kando
        - libcprime
        - libspng
        - linuxcommandlibrary
        - lunasvg
        - ly
        - menu-themes
        - nebula-gtk
        - pop-fonts
        - pop-icons
        - pop-launcher
        - pop-sounds-theme
        - python3-PyGithub
        - python3-anysqlite
        - python3-hishel
        - python3-inline-snapshot
        - python3-linkify-it-py
        - python3-textual
        - python3-uc-micro-py
        - quickemu
        - rgc
        - runkit
        - sdbus-cpp
        - shattered-pixel-dungeon
        - tdf
        - tomlplusplus
        - vbm
        - vtm
        - xdg-desktop-portal-cosmic
        - xdg-desktop-portal-hyprland
        - xut
        - zen-browser-aarch64-bin
        - zen-browser-bin
        - zig
permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      removed: ${{ steps.detect.outputs.removed }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: detect
        run: |
          packages=""
          removed=""

          if [ "${{ inputs.all }}" = "true" ]; then
            packages=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f " | sed 's/ $//')
          elif [ -n "${{ inputs.template }}" ]; then
            packages="${{ inputs.template }}"
          elif [ -n "${{ inputs.templates }}" ]; then
            packages=$(printf '%s ' ${{ inputs.templates }} | sed 's/ $//')
          elif [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            packages=$(git diff --diff-filter=ACMR --name-only HEAD~1 HEAD -- 'srcpkgs/*/template' \
              | cut -d/ -f2 | sort -u | tr '\n' ' ' | sed 's/ $//')
            removed=$(git diff --name-status HEAD~1 HEAD -- 'srcpkgs/*/template' \
              | awk '$1=="D"{print $2}' | cut -d/ -f2 | sort -u | tr '\n' ' ' | sed 's/ $//')
          else
            packages=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f " | sed 's/ $//')
          fi

          echo "Packages: ${packages:-<none>}"
          echo "Removed: ${removed:-<none>}"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Build: ${packages}" >> $GITHUB_STEP_SUMMARY
          echo "removed=$removed" >> "$GITHUB_OUTPUT"
          if [ -n "$removed" ]; then
            echo "Removed: ${removed}" >> $GITHUB_STEP_SUMMARY
          fi

          pkg_arch_ok() {
            local pkg="$1" target="$2"
            local template="srcpkgs/${pkg}/template"
            [ -f "$template" ] || return 0
            local archs last="" pat
            archs=$(grep -m1 '^archs=' "$template" | sed 's/^archs=//;s/"//g')
            [ -z "$archs" ] && return 0
            for pat in $archs; do
              last="$pat"
              case "$target" in
                ${pat#~}) case "$pat" in ~*) return 1 ;; *) return 0 ;; esac ;;
              esac
            done
            case "$last" in ~*) return 0 ;; esac
            return 1
          }

          arch_needed() {
            local target="$1"
            for pkg in $packages; do
              pkg_arch_ok "$pkg" "$target" && return 0
            done
            return 1
          }

          add_cfg() {
            [ -n "$matrix_configs" ] && matrix_configs="${matrix_configs},"
            matrix_configs="${matrix_configs}{\"arch\":\"$1\",\"host\":\"$2\",\"libc\":\"$3\",\"platform\":\"linux/amd64\",\"test\":$4}"
          }

          matrix_configs=""
          if [ -n "$packages" ]; then
            arch_needed "x86_64"       && add_cfg "x86_64"       "x86_64"      "glibc" 1
            arch_needed "aarch64"      && add_cfg "aarch64"      "x86_64"      "glibc" 0
            arch_needed "x86_64-musl"  && add_cfg "x86_64-musl"  "x86_64-musl" "musl"  1
            arch_needed "aarch64-musl" && add_cfg "aarch64-musl" "x86_64-musl" "musl"  0
            [ -z "$matrix_configs" ] && add_cfg "x86_64" "x86_64" "glibc" 1
          fi
          echo "matrix={\"config\":[${matrix_configs}]}" >> "$GITHUB_OUTPUT"

  test-pr:
    name: Test PR changes
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.packages != ''
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:20250616R1
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: '${{ matrix.config.arch }}'
        BOOTSTRAP: '${{ matrix.config.host }}'
        TEST: '${{ matrix.config.test }}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder

      - name: Checkout repo (PR head)
        run: |
          git clone "https://github.com/${{ github.repository }}.git" extra
          cd extra
          git fetch --no-tags origin "${{ github.event.pull_request.head.sha }}" --depth 1
          git checkout --detach "${{ github.event.pull_request.head.sha }}"

      - name: Checkout void-packages
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git void-packages
          cd void-packages
          git checkout --detach master

      - name: Merge templates and edit shlibs
        run: |
          SHLIBS_FILE="void-packages/common/shlibs"
          APPEND_FILE="extra/shlibs_append"
          REMOVE_FILE="extra/shlibs_remove"

          if [ -f "$REMOVE_FILE" ]; then
            echo "==> Removing shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              grep -vF "$line" "$SHLIBS_FILE" > "$SHLIBS_FILE.tmp" && mv "$SHLIBS_FILE.tmp" "$SHLIBS_FILE"
              echo "   - $line"
            done < "$REMOVE_FILE"
          fi

          if [ -f "$APPEND_FILE" ]; then
            echo "==> Adding shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              if ! grep -qF "$line" "$SHLIBS_FILE"; then
                echo "$line" >> "$SHLIBS_FILE"
                echo "   + $line"
              fi
            done < "$APPEND_FILE"
          fi

          echo "==> Copying templates..."
          for template in extra/srcpkgs/*; do
            template_name=$(basename "$template")
            rm -rf "void-packages/srcpkgs/$template_name"
            cp -rv "$template" void-packages/srcpkgs/
          done

      - name: Prepare masterdir
        run: |
          cd void-packages
          chown -R builder:builder .
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Lint templates
        if: matrix.config.arch == 'x86_64'
        continue-on-error: true
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          packages="${{ needs.detect.outputs.packages }}"
          cd void-packages

          for template_name in $packages; do
            echo "==> Linting ${template_name}"
            OUTPUT=$(sudo -Eu builder xlint "${template_name}" 2>&1) || true
            if [ -n "$OUTPUT" ]; then
              echo "❌ ${template_name} lint failed:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "❌ ${template_name}: $OUTPUT"
            else
              echo "✅ ${template_name} lint passed"
            fi
          done

      - name: Build packages
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          packages="${{ needs.detect.outputs.packages }}"

          if [ "$BOOTSTRAP" != "$ARCH" ]; then
            arch="-a $ARCH"
          fi

          if [ "$TEST" = 1 ]; then
            test="-Q"
          fi

          pkg_arch_ok() {
            local pkg="$1" target="$2"
            local template="srcpkgs/${pkg}/template"
            [ -f "$template" ] || return 0
            local archs last="" pat
            archs=$(grep -m1 '^archs=' "$template" | sed 's/^archs=//;s/"//g')
            [ -z "$archs" ] && return 0
            for pat in $archs; do
              last="$pat"
              case "$target" in
                ${pat#~})
                  case "$pat" in ~*) return 1 ;; *) return 0 ;; esac
                  ;;
              esac
            done
            case "$last" in ~*) return 0 ;; esac
            return 1
          }

          echo "==> Resolving dependencies for: $packages"
          PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $packages)

          echo "==> Build order with dependencies:"
          echo "$PKGS"
          echo

          for pkg in ${PKGS}; do
            if ! pkg_arch_ok "$pkg" "${ARCH}"; then
              echo "==> Skipping ${pkg}: not available for ${ARCH}"
              continue
            fi
            echo "==> Building ${pkg}"
            sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"
            echo
          done

  build:
    name: Build and publish packages
    needs: detect
    if: (github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.packages != ''
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:20250616R1
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: '${{ matrix.config.arch }}'
        BOOTSTRAP: '${{ matrix.config.host }}'
        TEST: '${{ matrix.config.test }}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder

      - name: Checkout this repo
        run: |
          git clone "https://github.com/${{ github.repository }}.git" extra
          cd extra
          git fetch --no-tags origin "${{ github.sha }}" --depth 1
          git checkout --detach "${{ github.sha }}"

      - name: Checkout void-packages
        run: |
          git clone --depth 1 https://github.com/void-linux/void-packages.git void-packages
          cd void-packages
          git checkout --detach master

      - name: Merge templates and edit shlibs
        run: |
          SHLIBS_FILE="void-packages/common/shlibs"
          APPEND_FILE="extra/shlibs_append"
          REMOVE_FILE="extra/shlibs_remove"

          if [ -f "$REMOVE_FILE" ]; then
            echo "==> Removing shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              grep -vF "$line" "$SHLIBS_FILE" > "$SHLIBS_FILE.tmp" && mv "$SHLIBS_FILE.tmp" "$SHLIBS_FILE"
              echo "   - $line"
            done < "$REMOVE_FILE"
          fi

          if [ -f "$APPEND_FILE" ]; then
            echo "==> Adding shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              if ! grep -qF "$line" "$SHLIBS_FILE"; then
                echo "$line" >> "$SHLIBS_FILE"
                echo "   + $line"
              fi
            done < "$APPEND_FILE"
          fi

          echo "==> Copying templates..."
          for template in extra/srcpkgs/*; do
            template_name=$(basename "$template")
            rm -rf "void-packages/srcpkgs/$template_name"
            cp -rv "$template" void-packages/srcpkgs/
          done

      - name: Prepare masterdir
        run: |
          cd void-packages
          chown -R builder:builder .
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build packages
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          packages="${{ needs.detect.outputs.packages }}"

          if [ "$BOOTSTRAP" != "$ARCH" ]; then
            arch="-a $ARCH"
          fi

          if [ "$TEST" = 1 ]; then
            test="-Q"
          fi

          pkg_arch_ok() {
            local pkg="$1" target="$2"
            local template="srcpkgs/${pkg}/template"
            [ -f "$template" ] || return 0
            local archs last="" pat
            archs=$(grep -m1 '^archs=' "$template" | sed 's/^archs=//;s/"//g')
            [ -z "$archs" ] && return 0
            for pat in $archs; do
              last="$pat"
              case "$target" in
                ${pat#~})
                  case "$pat" in ~*) return 1 ;; *) return 0 ;; esac
                  ;;
              esac
            done
            case "$last" in ~*) return 0 ;; esac
            return 1
          }

          echo "==> Resolving dependencies for: $packages"
          PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $packages)

          echo "==> Build order with dependencies:"
          echo "$PKGS"
          echo

          for pkg in ${PKGS}; do
            if ! pkg_arch_ok "$pkg" "${ARCH}"; then
              echo "==> Skipping ${pkg}: not available for ${ARCH}"
              continue
            fi
            echo "==> Building ${pkg}"
            sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"
            echo
          done

      - name: Sign packages
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
          XBPS_ARCH: ${{ matrix.config.arch }}
          XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
        working-directory: void-packages/hostdir/binpkgs/
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          export XBPS_TARGET_ARCH="${XBPS_ARCH}"

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "⚠️ No packages to sign"
            exit 0
          fi

          echo "==> Merging free + nonfree"
          if [ -d "nonfree" ]; then
            mv nonfree/*.xbps . 2>/dev/null || true
          fi

          echo "==> Writing private key"
          printf "%s\n" "$PRIV_KEY" > private.pem
          chmod 600 private.pem

          echo "==> Signing individual packages"
          xbps-rindex -S --privkey private.pem "$PWD"/*.xbps

          echo "==> Cleaning up private key"
          rm -f private.pem

      - name: Upload to Surfer
        working-directory: void-packages/hostdir/binpkgs
        env:
          ARCH: ${{ matrix.config.arch }}
          XBPS_ARCH: ${{ matrix.config.arch }}
          XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
          SURFER_TOKEN: ${{ secrets.SURFER_TOKEN }}
        run: |
          export XBPS_TARGET_ARCH="${XBPS_ARCH}"
          export PATH="/opt/xbps/usr/bin/:$PATH"

          SURFER_URL="https://repo.osowoso.org"
          WEBDAV="${SURFER_URL}/_webdav/${ARCH}"
          BUILDDIR="$(pwd)"

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "⚠️ No packages to upload"
            exit 0
          fi

          WORK_DIR=$(mktemp -d)
          DELETED_PKGS=""

          # Ensure remote directory exists
          curl -s -X MKCOL "${WEBDAV}/" -u ":${SURFER_TOKEN}" || true

          # Fetch remote file list (for old-version cleanup and HTML generation)
          echo "==> Fetching remote package list"
          REMOTE_LIST=$(curl -s -X PROPFIND "${WEBDAV}/" \
            -H "Depth: 1" \
            -u ":${SURFER_TOKEN}" 2>/dev/null \
            | grep -o '<D:href>[^<]*\.xbps</D:href>' \
            | sed 's|<D:href>||;s|</D:href>||;s|.*/||' || true)

          cd "$WORK_DIR"

          # Download only the repodata — xbps-rindex -a auto-replaces old version entries
          echo "==> Downloading repodata"
          curl -sf -o "${ARCH}-repodata" "${SURFER_URL}/${ARCH}/${ARCH}-repodata" \
            -u ":${SURFER_TOKEN}" 2>/dev/null || true

          # Copy newly built packages to work dir
          cp "$BUILDDIR"/*.xbps . 2>/dev/null || true
          cp "$BUILDDIR"/*.xbps.sig2 . 2>/dev/null || true

          # Delete old versions of updated packages from remote (no download needed)
          echo "==> Cleaning old package versions from remote"
          for new_pkg in "$BUILDDIR"/*.xbps; do
            [ -f "$new_pkg" ] || continue
            new_basename=$(basename "$new_pkg")
            base="${new_basename%.xbps}"
            without_arch="${base%.*}"
            pkg_ver=$(printf '%s' "$without_arch" | sed 's/^.*-\([0-9][^-]*\)$/\1/')
            pkg_name="${without_arch%-${pkg_ver}}"

            for old_pkg in $(printf '%s\n' $REMOTE_LIST | grep "^${pkg_name}-[0-9]"); do
              [ "$old_pkg" = "$new_basename" ] && continue
              echo "  Deleting old: $old_pkg"
              curl -s -X DELETE "${WEBDAV}/${old_pkg}" -u ":${SURFER_TOKEN}" || true
              curl -s -X DELETE "${WEBDAV}/${old_pkg}.sig2" -u ":${SURFER_TOKEN}" || true
              DELETED_PKGS="${DELETED_PKGS} ${old_pkg}"
            done
          done

          # Handle removed templates: download old pkg only to remove its index entry
          removed="${{ needs.detect.outputs.removed }}"
          if [ -n "$removed" ]; then
            echo "==> Removing packages for deleted templates: $removed"
            for pkg in $removed; do
              for old_pkg in $(printf '%s\n' $REMOTE_LIST | grep "^${pkg}-[0-9]"); do
                echo "  Removing: $old_pkg"
                if curl -sf -o "$old_pkg" "${SURFER_URL}/${ARCH}/${old_pkg}" \
                    -u ":${SURFER_TOKEN}" 2>/dev/null; then
                  xbps-rindex -r . "$old_pkg" || true
                  rm -f "$old_pkg" "${old_pkg}.sig2"
                fi
                curl -s -X DELETE "${WEBDAV}/${old_pkg}" -u ":${SURFER_TOKEN}" || true
                curl -s -X DELETE "${WEBDAV}/${old_pkg}.sig2" -u ":${SURFER_TOKEN}" || true
                DELETED_PKGS="${DELETED_PKGS} ${old_pkg}"
              done
            done
          fi

          # Update index: -a replaces old version entries automatically
          echo "==> Updating repository index"
          xbps-rindex -a *.xbps 2>/dev/null || true

          # Sign the repository
          printf "%s\n" "$PRIV_KEY" > private.pem
          chmod 600 private.pem
          xbps-rindex -s --signedby "zenobit <zenobit@disroot.org>" --privkey private.pem "$PWD"
          rm -f private.pem

          # Generate index.html: final list = (remote + new) - deleted
          echo "==> Generating index.html"
          TEMPLATE="${GITHUB_WORKSPACE}/extra/.github/arch-index-template.html"

          NEW_BASENAMES=$(ls "$BUILDDIR"/*.xbps 2>/dev/null | xargs -r -I{} basename {} || true)
          FINAL_PKGS=$(
            { printf '%s\n' $REMOTE_LIST; printf '%s\n' $NEW_BASENAMES; } \
            | grep '\.xbps$' | sort -u
          )
          for dpkg in $DELETED_PKGS; do
            FINAL_PKGS=$(printf '%s\n' "$FINAL_PKGS" | grep -v "^${dpkg}$")
          done

          NAV_TMP=$(mktemp)
          PKG_TMP=$(mktemp)
          for a in x86_64 x86_64-musl aarch64 aarch64-musl; do
            if [ "$a" = "${ARCH}" ]; then
              printf '  <li><a href="." class="active">%s</a></li>\n' "$a" >> "$NAV_TMP"
            else
              printf '  <li><a href="../%s/">%s</a></li>\n' "$a" "$a" >> "$NAV_TMP"
            fi
          done

          {
            printf '<table>\n<thead><tr><th>package</th><th>version</th><th>download</th></tr></thead>\n<tbody>\n'
            printf '%s\n' $FINAL_PKGS | sort | while IFS= read -r xbps_file; do
              [ -z "$xbps_file" ] && continue
              base="${xbps_file%.xbps}"
              without_arch="${base%.*}"
              pkg_ver=$(printf '%s' "$without_arch" | sed 's/^.*-\([0-9][^-]*\)$/\1/')
              pkg_name="${without_arch%-${pkg_ver}}"
              printf '<tr><td><strong>%s</strong></td><td>%s</td><td><a href="https://repo.osowoso.org/%s/%s">&#x2b07; %s</a></td></tr>\n' \
                "$pkg_name" "$pkg_ver" "${ARCH}" "$xbps_file" "$xbps_file"
            done
            printf '</tbody>\n</table>\n'
          } > "$PKG_TMP"

          sed \
            -e "s|__ARCH__|${ARCH}|g" \
            -e "s|__CSS_URL__|https://repos.osowoso.org/style.css|g" \
            -e "s|__HOME_URL__|https://repos.osowoso.org|g" \
            -e "s|__REPO_URL__|https://repo.osowoso.org/${ARCH}|g" \
            -e "s|__FAVICON__||g" \
            -e "s|__SVGCOLOR__||g" \
            "$TEMPLATE" \
          | awk \
            -v nav="$NAV_TMP" \
            -v tbl="$PKG_TMP" \
            '/__NAV_ARCH_LINKS__/ { while ((getline ln < nav) > 0) print ln; close(nav); next }
             /__PACKAGE_TABLE__/  { while ((getline ln < tbl) > 0) print ln; close(tbl); next }
             { print }' \
          > index.html

          rm -f "$NAV_TMP" "$PKG_TMP"
          pkg_count=$(printf '%s\n' "$FINAL_PKGS" | grep -c '.' || echo 0)
          echo "  Generated index.html (${pkg_count} packages)"

          # Upload only new packages + updated repodata + index.html
          echo "==> Uploading to Surfer"
          for file in *.xbps *.xbps.sig2 *-repodata index.html; do
            [ -f "$file" ] || continue
            echo "  Uploading: $file"
            curl -s -T "$file" "${WEBDAV}/${file}" \
              -u ":${SURFER_TOKEN}" || echo "  ⚠️ Failed: $file"
          done

          echo "==> Done: ${SURFER_URL}/${ARCH}/"
          echo "Added to https://repo.osowoso.org/${ARCH}/" >> $GITHUB_STEP_SUMMARY

          cd /
          rm -rf "$WORK_DIR"
