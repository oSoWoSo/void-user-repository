name: matrix build

on:
  pull_request:
    paths:
      - 'srcpkgs/**'
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      all:
        description: 'Rebuild everything'
        required: false
        default: false
        type: boolean
      templates:
        description: 'Build multiple packages'
        required: false
        type: string
      template:
        description: 'Build single package'
        required: false
        type: choice
        options:
        -
        - Vish
        - aquamarine
        - brow6el
        - btrfs-progs
        - gh-lazy
        - glaze
        - hyprcursor
        - hyprdynamicmonitors
        - hyprgraphics
        - hypridle
        - hyprland
        - hyprland-devel
        - hyprland-guiutils
        - hyprland-protocols
        - hyprland-qt-support
        - hyprlang
        - hyprlock
        - hyprpaper
        - hyprpicker
        - hyprpolkitagent
        - hyprsunset
        - hyprsysteminfo
        - hyprtoolkit
        - hyprutils
        - hyprwayland-scanner
        - libspng
        - linuxcommandlibrary
        - ly
        - nebula-gtk
        - python3-PyGithub
        - python3-anysqlite
        - python3-hishel
        - python3-inline-snapshot
        - python3-linkify-it-py
        - python3-textual
        - python3-uc-micro-py
        - quickemu
        - rgc
        - sdbus-cpp
        - shattered-pixel-dungeon
        - tdf
        - tomlplusplus
        - vbm
        - xdg-desktop-portal-hyprland
        - zen-browser
        - zig
permissions:
  contents: write
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      removed: ${{ steps.detect.outputs.removed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: detect
        run: |
          packages=""
          removed=""

          if [ "${{ inputs.all }}" = "true" ]; then
            packages=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f " | sed 's/ $//')
          elif [ -n "${{ inputs.template }}" ]; then
            packages="${{ inputs.template }}"
          elif [ -n "${{ inputs.templates }}" ]; then
            packages=$(printf '%s ' ${{ inputs.templates }} | sed 's/ $//')
          elif [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            packages=$(git diff --name-only HEAD~1 HEAD -- 'srcpkgs/*/template' \
              | cut -d/ -f2 | sort -u | tr '\n' ' ' | sed 's/ $//')
            removed=$(git diff --name-status HEAD~1 HEAD -- 'srcpkgs/*/template' \
              | awk '$1=="D"{print $2}' | cut -d/ -f2 | sort -u | tr '\n' ' ' | sed 's/ $//')
          else
            packages=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f " | sed 's/ $//')
          fi

          echo "Packages: ${packages:-<none>}"
          echo "Removed: ${removed:-<none>}"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Build: ${packages}" >> $GITHUB_STEP_SUMMARY
          echo "removed=$removed" >> "$GITHUB_OUTPUT"
          echo "Removed: ${removed}" >> $GITHUB_STEP_SUMMARY

  test-pr:
    name: Test PR changes
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.packages != ''
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:20250616R1
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: '${{ matrix.config.arch }}'
        BOOTSTRAP: '${{ matrix.config.host }}'
        TEST: '${{ matrix.config.test }}'
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64,       host: x86_64,      libc: glibc, platform: linux/amd64, test: 1 }
          - { arch: aarch64,      host: x86_64,      libc: glibc, platform: linux/amd64, test: 0 }
          - { arch: x86_64-musl,  host: x86_64-musl, libc: musl,  platform: linux/amd64, test: 1 }
          - { arch: aarch64-musl, host: x86_64-musl, libc: musl,  platform: linux/amd64, test: 0 }

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder

      - name: Checkout repo (PR head)
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" extra
          cd extra
          git fetch --no-tags origin "${{ github.event.pull_request.head.sha }}" --depth 1
          git checkout --detach "${{ github.event.pull_request.head.sha }}"

      - name: Checkout void-packages
        run: |
          git clone https://github.com/void-linux/void-packages.git void-packages
          cd void-packages
          git checkout --detach master

      - name: Merge templates and edit shlibs
        run: |
          SHLIBS_FILE="void-packages/common/shlibs"
          APPEND_FILE="extra/shlibs_append"
          REMOVE_FILE="extra/shlibs_remove"

          if [ -f "$REMOVE_FILE" ]; then
            echo "==> Removing shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              grep -vF "$line" "$SHLIBS_FILE" > "$SHLIBS_FILE.tmp" && mv "$SHLIBS_FILE.tmp" "$SHLIBS_FILE"
              echo "   - $line"
            done < "$REMOVE_FILE"
          fi

          if [ -f "$APPEND_FILE" ]; then
            echo "==> Adding shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              if ! grep -qF "$line" "$SHLIBS_FILE"; then
                echo "$line" >> "$SHLIBS_FILE"
                echo "   + $line"
              fi
            done < "$APPEND_FILE"
          fi

          echo "==> Copying templates..."
          for template in extra/srcpkgs/*; do
            template_name=$(basename "$template")
            rm -rf "void-packages/srcpkgs/$template_name"
            cp -rv "$template" void-packages/srcpkgs/
          done

      - name: Prepare masterdir
        run: |
          cd void-packages
          chown -R builder:builder .
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Lint templates
        if: matrix.config.arch == 'x86_64'
        continue-on-error: true
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          packages="${{ needs.detect.outputs.packages }}"
          cd void-packages

          for template_name in $packages; do
            echo "==> Linting ${template_name}"
            OUTPUT=$(sudo -Eu builder xlint "${template_name}" 2>&1) || true
            if [ -n "$OUTPUT" ]; then
              echo "❌ ${template_name} lint failed:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "❌ ${template_name}: $OUTPUT"
            else
              echo "✅ ${template_name} lint passed"
            fi
          done

      - name: Build packages
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          packages="${{ needs.detect.outputs.packages }}"

          if [ "$BOOTSTRAP" != "$ARCH" ]; then
            arch="-a $ARCH"
          fi

          if [ "$TEST" = 1 ]; then
            test="-Q"
          fi

          echo "==> Resolving dependencies for: $packages"
          PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $packages)
          failed=""

          echo "==> Build order with dependencies:"
          echo "$PKGS"
          echo

          for pkg in ${PKGS}; do
            echo "==> Building ${pkg}"
            if ! sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"; then
              echo "⚠️ build failed: ${pkg}"
              failed="${failed} ${pkg}"
            else
              echo
              echo "✅ ${pkg} built successfully"
            fi
            echo
            echo
          done

          if [ -n "${failed}" ]; then
            echo "❌ Failed builds" >> $GITHUB_STEP_SUMMARY
            for f in ${failed}; do
              echo "  - ${f}" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "✅ All builds succeeded"
          fi

  build:
    name: Build and publish packages
    needs: detect
    if: (github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.packages != ''
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-${{ matrix.config.libc }}-full:20250616R1
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: '${{ matrix.config.arch }}'
        BOOTSTRAP: '${{ matrix.config.host }}'
        TEST: '${{ matrix.config.test }}'
    strategy:
      fail-fast: false
      matrix:
        config:
          - { arch: x86_64,       host: x86_64,      libc: glibc, platform: linux/amd64, test: 1 }
          - { arch: aarch64,      host: x86_64,      libc: glibc, platform: linux/amd64, test: 0 }
          - { arch: x86_64-musl,  host: x86_64-musl, libc: musl,  platform: linux/amd64, test: 1 }
          - { arch: aarch64-musl, host: x86_64-musl, libc: musl,  platform: linux/amd64, test: 0 }

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu && xbps-install -y sudo bash curl git
          useradd -G xbuilder -M builder

      - name: Checkout this repo
        run: |
          git clone --depth 1 "https://github.com/${{ github.repository }}.git" extra
          cd extra
          git fetch --no-tags origin "${{ github.sha }}" --depth 1
          git checkout --detach "${{ github.sha }}"

      - name: Checkout void-packages
        run: |
          git clone https://github.com/void-linux/void-packages.git void-packages
          cd void-packages
          git checkout --detach master

      - name: Merge templates and edit shlibs
        run: |
          SHLIBS_FILE="void-packages/common/shlibs"
          APPEND_FILE="extra/shlibs_append"
          REMOVE_FILE="extra/shlibs_remove"

          if [ -f "$REMOVE_FILE" ]; then
            echo "==> Removing shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              grep -vF "$line" "$SHLIBS_FILE" > "$SHLIBS_FILE.tmp" && mv "$SHLIBS_FILE.tmp" "$SHLIBS_FILE"
              echo "   - $line"
            done < "$REMOVE_FILE"
          fi

          if [ -f "$APPEND_FILE" ]; then
            echo "==> Adding shlibs entries"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              if ! grep -qF "$line" "$SHLIBS_FILE"; then
                echo "$line" >> "$SHLIBS_FILE"
                echo "   + $line"
              fi
            done < "$APPEND_FILE"
          fi

          echo "==> Copying templates..."
          for template in extra/srcpkgs/*; do
            template_name=$(basename "$template")
            rm -rf "void-packages/srcpkgs/$template_name"
            cp -rv "$template" void-packages/srcpkgs/
          done

      - name: Prepare masterdir
        run: |
          cd void-packages
          chown -R builder:builder .
          sudo -Eu builder common/travis/set_mirror.sh
          sudo -Eu builder common/travis/prepare.sh
          common/travis/fetch-xtools.sh

      - name: Build packages
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd void-packages
          packages="${{ needs.detect.outputs.packages }}"

          if [ "$BOOTSTRAP" != "$ARCH" ]; then
            arch="-a $ARCH"
          fi

          if [ "$TEST" = 1 ]; then
            test="-Q"
          fi

          echo "==> Resolving dependencies for: $packages"
          PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $packages)
          failed=""

          echo "==> Build order with dependencies:"
          echo "$PKGS"
          echo

          for pkg in ${PKGS}; do
            echo "==> Building ${pkg}"
            if ! sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"; then
              echo "⚠️ build failed: ${pkg}"
              failed="${failed} ${pkg}"
            else
              echo
              echo "✅ ${pkg} built successfully"
            fi
            echo
            echo
          done

          if [ -n "${failed}" ]; then
            echo "❌ Failed builds" >> $GITHUB_STEP_SUMMARY
            for f in ${failed}; do
              echo "  - ${f}" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "✅ All builds succeeded"
          fi

      - name: Sign packages
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
          XBPS_ARCH: ${{ matrix.config.arch }}
          XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
        working-directory: void-packages/hostdir/binpkgs/
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          export XBPS_TARGET_ARCH="${XBPS_ARCH}"

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "⚠️ No packages to sign"
            exit 0
          fi

          echo "==> Merging free + nonfree"
          if [ -d "nonfree" ]; then
            mv nonfree/*.xbps . 2>/dev/null || true
          fi

          echo "==> Writing private key"
          printf "%s\n" "$PRIV_KEY" > private.pem
          chmod 600 private.pem

          echo "==> Signing individual packages"
          xbps-rindex -S --privkey private.pem "$PWD"/*.xbps

          echo "==> Cleaning up private key"
          rm -f private.pem

      - name: Upload to Surfer
        working-directory: void-packages/hostdir/binpkgs
        env:
          ARCH: ${{ matrix.config.arch }}
          XBPS_ARCH: ${{ matrix.config.arch }}
          XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
          SURFER_TOKEN: ${{ secrets.SURFER_TOKEN }}
        run: |
          export XBPS_TARGET_ARCH="${XBPS_ARCH}"
          export PATH="/opt/xbps/usr/bin/:$PATH"

          SURFER_URL="https://repo.osowoso.org"
          WEBDAV="${SURFER_URL}/_webdav/${ARCH}"
          BUILDDIR="$(pwd)"

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "⚠️ No packages to upload"
            exit 0
          fi

          WORK_DIR=$(mktemp -d)

          # Ensure remote directory exists
          curl -s -X MKCOL "${WEBDAV}/" -u ":${SURFER_TOKEN}" || true

          # List existing .xbps files on Surfer via WebDAV
          echo "==> Fetching existing file list"
          EXISTING_PKGS=$(curl -s -X PROPFIND "${WEBDAV}/" \
            -H "Depth: 1" \
            -u ":${SURFER_TOKEN}" 2>/dev/null \
            | grep -o '<D:href>[^<]*\.xbps</D:href>' \
            | sed 's|<D:href>||;s|</D:href>||;s|.*/||' || true)

          # Download existing packages to rebuild complete index
          cd "$WORK_DIR"
          if [ -n "$EXISTING_PKGS" ]; then
            echo "==> Downloading existing packages"
            for pkg in $EXISTING_PKGS; do
              curl -sf -o "$pkg" "${SURFER_URL}/${ARCH}/${pkg}" \
                -u ":${SURFER_TOKEN}" && echo "  Downloaded: $pkg" || true
              curl -sf -o "${pkg}.sig2" "${SURFER_URL}/${ARCH}/${pkg}.sig2" \
                -u ":${SURFER_TOKEN}" 2>/dev/null || true
            done
          fi

          # Remove packages for deleted templates
          removed="${{ needs.detect.outputs.removed }}"
          if [ -n "$removed" ]; then
            echo "==> Removing packages for deleted templates: $removed"
            for pkg in $removed; do
              for old_pkg in "${pkg}"-*.xbps; do
                [ -f "$old_pkg" ] || continue
                echo "  Removing: $old_pkg"
                curl -s -X DELETE "${WEBDAV}/${old_pkg}" -u ":${SURFER_TOKEN}" || true
                curl -s -X DELETE "${WEBDAV}/${old_pkg}.sig2" -u ":${SURFER_TOKEN}" || true
                rm -f "$old_pkg" "${old_pkg}.sig2"
              done
            done
          fi

          # Replace old versions with newly built packages
          echo "==> Processing new packages"
          for new_pkg in "$BUILDDIR"/*.xbps; do
            [ -f "$new_pkg" ] || continue
            new_basename=$(basename "$new_pkg")
            new_basename_no_ext="${new_basename%.xbps}"
            pkg_name="${new_basename_no_ext%-*}"

            for old_pkg in "${pkg_name}"-*.xbps; do
              [ -f "$old_pkg" ] || continue
              [ "$old_pkg" = "$new_basename" ] && continue
              echo "  Removing old: $old_pkg"
              curl -s -X DELETE "${WEBDAV}/${old_pkg}" -u ":${SURFER_TOKEN}" || true
              curl -s -X DELETE "${WEBDAV}/${old_pkg}.sig2" -u ":${SURFER_TOKEN}" || true
              rm -f "$old_pkg" "${old_pkg}.sig2"
            done

            cp "$new_pkg" ./
            [ -f "${new_pkg}.sig2" ] && cp "${new_pkg}.sig2" ./ || true
          done

          # Build complete repository index and sign it
          echo "==> Building repository index"
          xbps-rindex -a *.xbps 2>/dev/null || true

          printf "%s\n" "$PRIV_KEY" > private.pem
          chmod 600 private.pem
          xbps-rindex -s --signedby "zenobit <zenobit@disroot.org>" --privkey private.pem "$PWD"
          xbps-rindex -c "$PWD"
          rm -f private.pem

          # Generate index.html using shared template
          echo "==> Generating index.html"
          TEMPLATE="${GITHUB_WORKSPACE}/extra/.github/arch-index-template.html"

          NAV_TMP=$(mktemp)
          PKG_TMP=$(mktemp)
          for a in x86_64 x86_64-musl aarch64 aarch64-musl; do
            if [ "$a" = "${ARCH}" ]; then
              printf '  <li><a href="." class="active">%s</a></li>\n' "$a" >> "$NAV_TMP"
            else
              printf '  <li><a href="../%s/">%s</a></li>\n' "$a" "$a" >> "$NAV_TMP"
            fi
          done

          {
            printf '<table>\n<thead><tr><th>package</th><th>version</th><th>download</th></tr></thead>\n<tbody>\n'
            for xbps_file in $(ls *.xbps 2>/dev/null | sort); do
              base="${xbps_file%.xbps}"
              without_arch="${base%.*}"
              pkg_ver=$(printf '%s' "$without_arch" | sed 's/^.*-\([0-9][^-]*\)$/\1/')
              pkg_name="${without_arch%-${pkg_ver}}"
              printf '<tr><td><strong>%s</strong></td><td>%s</td><td><a href="https://repo.osowoso.org/%s/%s">&#x2b07; %s</a></td></tr>\n' \
                "$pkg_name" "$pkg_ver" "${ARCH}" "$xbps_file" "$xbps_file"
            done
            printf '</tbody>\n</table>\n'
          } > "$PKG_TMP"

          sed \
            -e "s|__ARCH__|${ARCH}|g" \
            -e "s|__CSS_URL__|https://repos.osowoso.org/style.css|g" \
            -e "s|__HOME_URL__|https://repos.osowoso.org|g" \
            -e "s|__REPO_URL__|https://repo.osowoso.org/${ARCH}|g" \
            -e "s|__FAVICON__||g" \
            -e "s|__SVGCOLOR__||g" \
            "$TEMPLATE" \
          | awk \
            -v nav="$NAV_TMP" \
            -v tbl="$PKG_TMP" \
            '/__NAV_ARCH_LINKS__/ { while ((getline ln < nav) > 0) print ln; close(nav); next }
             /__PACKAGE_TABLE__/  { while ((getline ln < tbl) > 0) print ln; close(tbl); next }
             { print }' \
          > index.html

          rm -f "$NAV_TMP" "$PKG_TMP"
          echo "  Generated index.html ($(ls *.xbps 2>/dev/null | wc -l) packages)"

          # Upload everything to Surfer
          echo "==> Uploading to Surfer"
          for file in *.xbps *.xbps.sig2 *-repodata index.html; do
            [ -f "$file" ] || continue
            echo "  Uploading: $file"
            curl -s -T "$file" "${WEBDAV}/${file}" \
              -u ":${SURFER_TOKEN}" || echo "  ⚠️ Failed: $file"
          done

          echo "==> Done: ${SURFER_URL}/${ARCH}/"
          echo "✅ Uploaded to https://repo.osowoso.org/${ARCH}/" >> $GITHUB_STEP_SUMMARY

          cd /
          rm -rf "$WORK_DIR"
