name: Cleanup old package versions

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  packages: read

jobs:
  cleanup:
    name: ${{ matrix.arch }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/osowoso/oco-builder-x86_64:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged
      volumes:
        - /dev:/dev
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86_64-musl, aarch64, aarch64-musl]

    steps:
      - name: Mount repo via WebDAV
        env:
          SURFER_TOKEN: ${{ secrets.SURFER_TOKEN }}
          ARCH: ${{ matrix.arch }}
        run: |
          echo user_allow_other >> /etc/fuse.conf
          mkdir -p /repo
          RCLONE_WEBDAV_URL="https://repo.osowoso.org/_webdav/${ARCH}/" \
          RCLONE_WEBDAV_PASS="$(rclone obscure "$SURFER_TOKEN")" \
          rclone mount :webdav: /repo \
            --allow-other \
            --vfs-cache-mode writes \
            --log-file /tmp/rclone.log &
          until mountpoint -q /repo; do
            sleep 1
            kill -0 $! 2>/dev/null || { cat /tmp/rclone.log >&2; exit 1; }
          done

      - name: Remove old versions and reindex
        env:
          ARCH: ${{ matrix.arch }}
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
        working-directory: /repo
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          export XBPS_TARGET_ARCH="$ARCH"

          ls ./*.xbps 1>/dev/null 2>&1 || { echo "==> Repo empty, nothing to do"; exit 0; }

          # Build index -- keeps only the latest version per package name.
          xbps-rindex -a ./*.xbps

          # Remove .xbps files that are no longer in the index (old versions).
          _removed=0
          for f in ./*.xbps; do
            [ -f "$f" ] || continue
            base="${f##*/}"
            pkgver="${base%.xbps}"
            pkgver="${pkgver%.*}"   # strip .arch or .noarch suffix
            pkgname=$(xbps-uhelper getpkgname "$pkgver" 2>/dev/null) || continue
            indexed=$(xbps-query --repository=. -R -ppkgver "$pkgname" 2>/dev/null) || continue
            [ "$indexed" = "$pkgver" ] && continue
            echo "==> Removing old: $base (current: $indexed)"
            rm -f "$f" "${f}.sig2"
            _removed=$((_removed + 1))
          done

          if [ "$_removed" -gt 0 ]; then
            trap 'rm -f private.pem' EXIT INT TERM
            ( umask 077 && printf '%s\n' "$PRIV_KEY" > private.pem )
            xbps-rindex -a ./*.xbps
            xbps-rindex -s --signedby "zenobit <zenobit@disroot.org>" --privkey private.pem .
            rm -f private.pem
            echo "Removed ${_removed} old file(s) from ${ARCH}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "${ARCH}: nothing to clean" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Unmount repo
        if: always()
        run: fusermount -u /repo 2>/dev/null || true
