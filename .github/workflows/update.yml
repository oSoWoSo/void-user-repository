name: Update templatesList and workflow
on:
  push:
    paths:
      - 'srcpkgs/**'
      - '.github/build.yml.in'
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  list-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.WORKFLOWS }}
          fetch-depth: 2

      - name: Update repo
        run: ./update-repo -u

      - name: Push results
        env:
          TOKEN: ${{ secrets.WORKFLOWS }}
        run: |
          set -e
          git config --global user.name "oSoWoso-bot"
          git config --global user.email "osowoso@disroot.org"
          # Fail loudly if any of these files is missing -- they are all
          # regenerated by `update-repo -u` and a missing one means a bug.
          git add README.md .github/templatesList .github/workflows/build.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "CI: update"
          git push
          git status
