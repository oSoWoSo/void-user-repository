name: Update templatesList and workflow
on:
  push:
    paths:
      - 'srcpkgs/**'
      - '.github/build-REST.yml'
      - '.github/build-START.yml'
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  list-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.WORKFLOWS }}
          fetch-depth: 2

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Update repo
        run: ./update-repo -u

      - name: Regenerate website
        run: ./update-repo -w

      - name: Push results
        env:
          TOKEN: ${{ secrets.WORKFLOWS }}
        run: |
          git config --global user.name "oSoWoso-bot"
          git config --global user.email "osowoso@disroot.org"
          git add README.md || echo "README.md not added"
          git add .github/templatesList || echo "templatesList not added"
          git add .github/workflows/build.yml || echo "build.yml not added"
          git commit -m "CI: update" || echo "Nothing to commit"
          git push || echo "Nothing to push"
          git status

      - name: Upload changed website assets
        env:
          SURFER_TOKEN: ${{ secrets.SURFER_TOKEN }}
        run: |
          WEBDAV="https://repo.osowoso.org/_webdav"

          git fetch origin page --depth=1 2>/dev/null || true

          upload_if_changed() {
            local src="$1" dest="$2" page_path="$3"
            local old new
            old=$(git show origin/page:"$page_path" 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "")
            new=$(sha256sum < "$src" | cut -d' ' -f1)
            if [ "$old" != "$new" ]; then
              echo "  Uploading (changed): $page_path"
              curl -s -T "$src" "${WEBDAV}/${dest}" -u ":${SURFER_TOKEN}" \
                || echo "  Warning: failed to upload $page_path"
            else
              echo "  Skipped (unchanged): $page_path"
            fi
          }

          echo "==> Uploading changed website assets"
          for file in docs/*; do
            [ -f "$file" ] || continue
            fname=$(basename "$file")
            upload_if_changed "$file" "$fname" "$fname"
          done

          echo "==> Uploading changed arch pages"
          for arch in x86_64 x86_64-musl aarch64 aarch64-musl; do
            [ -f "docs/$arch/index.html" ] || continue
            curl -s -X MKCOL "${WEBDAV}/${arch}/" -u ":${SURFER_TOKEN}" || true
            upload_if_changed "docs/$arch/index.html" "${arch}/index.html" "${arch}/index.html"
          done

          echo "==> Done: https://repo.osowoso.org/"

      - name: Deploy website to page branch
        env:
          TOKEN: ${{ secrets.WORKFLOWS }}
        run: |
          cd docs
          git init
          git config user.name "oSoWoso-bot"
          git config user.email "osowoso@disroot.org"
          git checkout -b page
          git add .
          git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" page
