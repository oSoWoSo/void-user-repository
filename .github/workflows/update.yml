name: Update templatesList and workflow
on:
  push:
    #branches:
    #  - main
    paths:
      - 'srcpkgs/**'
      - '.github/build-REST.yml'
      - '.github/build-START.yml'
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  list-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.WORKFLOWS }}
          fetch-depth: 2  # shallow clone

      - name: Update templatesList and detect changes
        id: detect
        run: |
          set -e
          find srcpkgs -mindepth 1 -maxdepth 1 \( -type d -o -type l \) -printf "%f\n" \
            | sort > .github/templatesList
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "==> First commit"
            ADDED=$(cat .github/templatesList)
            MODIFIED=""
            REMOVED=""
          else
            DIFF=$(git diff --name-status HEAD~1 HEAD -- srcpkgs)
            echo "$DIFF"
            extract_pkg() {
              cut -d/ -f2
            }
            ADDED=$(echo "$DIFF" | awk '$1=="A"{print $2}' | extract_pkg | sort -u)
            MODIFIED=$(echo "$DIFF" | awk '$1=="M"{print $2}' | extract_pkg | sort -u)
            REMOVED=$(echo "$DIFF" | awk '$1=="D"{print $2}' | extract_pkg | sort -u)
          fi
          ADDED=$(echo "$ADDED" | sed '/^$/d')
          MODIFIED=$(echo "$MODIFIED" | sed '/^$/d')
          REMOVED=$(echo "$REMOVED" | sed '/^$/d')
          ADDED=$(echo "$ADDED" | sort -u)
          MODIFIED=$(echo "$MODIFIED" | sort -u)
          REMOVED=$(echo "$REMOVED" | sort -u)
          ADDED_LIST=$(echo "$ADDED" | tr '\n' ' ' | sed 's/ $//')
          MODIFIED_LIST=$(echo "$MODIFIED" | tr '\n' ' ' | sed 's/ $//')
          REMOVED_LIST=$(echo "$REMOVED" | tr '\n' ' ' | sed 's/ $//')
          echo "added=$ADDED_LIST" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED_LIST" >> $GITHUB_OUTPUT
          echo "removed=$REMOVED_LIST" >> $GITHUB_OUTPUT
          COMBINED=$(printf "%s\n%s\n" "$ADDED" "$MODIFIED" \
            | sed '/^$/d' | sort -u | tr '\n' ' ' | sed 's/ $//')
          echo "templates=$COMBINED" >> $GITHUB_OUTPUT
          echo "count=$(echo "$COMBINED" | wc -w)" >> $GITHUB_OUTPUT
          echo "==> A: $ADDED_LIST"
          echo "==> M: $MODIFIED_LIST"
          echo "==> D: $REMOVED_LIST"
          echo "==> Build: $COMBINED"

      - name: Update README
        run: |
          sed -i '/## Available packages/,$!w temp.md' README.md
          sed -i '/## The `vay` script/,$w end.md' README.md
          echo "## Available packages" >> temp.md
          echo "| package | version | homepage | maintainer | notes |" >> temp.md
          echo "|:--------|:--------|:---------|:-----------|:------|" >> temp.md
          while IFS= read -r line; do
            package=$line
            template_file="srcpkgs/$line/template"
            if [ -f "$template_file" ]; then
              homepage=$(grep '^homepage=' "$template_file" | cut -d '=' -f2 | cut -d'"' -f2)
              version=$(grep '^version=' "$template_file" | cut -d '=' -f2)
              maintainer=$(grep '^maintainer=' "$template_file" | cut -d '=' -f2 | cut -d' ' -f1 | cut -d'"' -f2)
              notes=$(grep '^archs=' "$template_file" | cut -d'=' -f2 | cut -d'"' -f2)
              echo "| $package | $version | $homepage | $maintainer | $notes |" >> temp.md
            fi
          done < .github/templatesList
          cat end.md >> temp.md
          mv temp.md README.md
          rm end.md

      - name: Update build workflow
        run: |
          cd .github/workflows
          cp -f ../build-START.yml build.yml
          while read -r line; do
            echo "        - $(echo "$line")"
          done < ../templatesList >> build.yml
          cat ../build-REST.yml >> build.yml

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Regenerate website
        run: ./create-web build "Void Community Repository"

      - name: Push results
        env:
          TOKEN: ${{ secrets.WORKFLOWS }}
        run: |
          git config --global user.name "oSoWoso-bot"
          git config --global user.email "osowoso@disroot.org"
          git add README.md || echo "README.md not added"
          git add .github/templatesList || echo "templatesList not added"
          git add .github/workflows/build.yml || echo "build.yml not added"
          git commit -m "CI: update" || echo "Nothing to commit"
          git push || echo "Nothing to push"
          git status

      - name: Deploy website to page branch
        env:
          TOKEN: ${{ secrets.WORKFLOWS }}
        run: |
          cd docs
          git init
          git config user.name "oSoWoso-bot"
          git config user.email "osowoso@disroot.org"
          git checkout -b page
          git add .
          git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force \
            "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git" \
            page

      - name: Trigger build workflow
        if: steps.detect.outputs.new_count > 0
        env:
          GH_TOKEN: ${{ secrets.WORKFLOWS }}
        run: |
          NEW_COUNT="${{ steps.detect.outputs.new_count }}"
          SINGLE="${{ steps.detect.outputs.single_template }}"
          MULTIPLE="${{ steps.detect.outputs.templates }}"

          # Wait a bit for push (Just in case)
          sleep 5

          if [ "$NEW_COUNT" -eq 1 ]; then
            echo "==> Triggering build for single template: $SINGLE"
            gh workflow run build.yml -f template="$SINGLE"
          elif [ "$NEW_COUNT" -gt 1 ]; then
            echo "==> Triggering build for multiple templates: $MULTIPLE"
            gh workflow run build.yml -f templates="$MULTIPLE"
          fi

          echo "==> Build workflow triggered successfully"
