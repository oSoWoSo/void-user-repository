permissions:
  contents: write
  pull-requests: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect packages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      removed: ${{ steps.detect.outputs.removed }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: detect
        run: |
          packages=""
          removed=""

          if [ "${{ inputs.all }}" = "true" ]; then
            packages=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f " | sed 's/ $//')
          elif [ -n "${{ inputs.template }}" ]; then
            packages="${{ inputs.template }}"
          elif [ -n "${{ inputs.templates }}" ]; then
            packages=$(printf '%s ' ${{ inputs.templates }} | sed 's/ $//')
          elif [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
            packages=$(git diff --diff-filter=ACMR --name-only HEAD~1 HEAD -- 'srcpkgs/*/template' \
              | cut -d/ -f2 | sort -u | tr '\n' ' ' | sed 's/ $//')
            removed=$(git diff --name-status HEAD~1 HEAD -- 'srcpkgs/*/template' \
              | awk '$1=="D"{print $2}' | cut -d/ -f2 | sort -u | tr '\n' ' ' | sed 's/ $//')
          else
            packages=$(find srcpkgs -maxdepth 1 -mindepth 1 -type d -printf "%f " | sed 's/ $//')
          fi

          echo "Packages: ${packages:-<none>}"
          echo "Removed: ${removed:-<none>}"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Build: ${packages}" >> $GITHUB_STEP_SUMMARY
          echo "removed=$removed" >> "$GITHUB_OUTPUT"
          if [ -n "$removed" ]; then
            echo "Removed: ${removed}" >> $GITHUB_STEP_SUMMARY
          fi

          pkg_arch_ok() {
            local pkg="$1" target="$2"
            local template="srcpkgs/${pkg}/template"
            [ -f "$template" ] || return 0
            local archs last="" pat
            archs=$(grep -m1 '^archs=' "$template" | sed 's/^archs=//;s/"//g')
            [ -z "$archs" ] && return 0
            for pat in $archs; do
              last="$pat"
              case "$target" in
                ${pat#~}) case "$pat" in ~*) return 1 ;; *) return 0 ;; esac ;;
              esac
            done
            case "$last" in ~*) return 0 ;; esac
            return 1
          }

          arch_needed() {
            local target="$1"
            for pkg in $packages; do
              pkg_arch_ok "$pkg" "$target" && return 0
            done
            return 1
          }

          needs_native_aarch64() {
            for pkg in $packages; do
              local template="srcpkgs/${pkg}/template"
              [ -f "$template" ] || continue
              grep -q '^nocross=' "$template" || continue
              pkg_arch_ok "$pkg" "aarch64" && return 0
            done
            return 1
          }

          add_cfg() {
            [ -n "$matrix_configs" ] && matrix_configs="${matrix_configs},"
            matrix_configs="${matrix_configs}{\"arch\":\"$1\",\"host\":\"$2\",\"runner\":\"$3\",\"platform\":\"$4\",\"test\":$5,\"native\":$6}"
          }

          matrix_configs=""
          if [ -n "$packages" ]; then
            arch_needed "x86_64"       && add_cfg "x86_64"       "x86_64"      "ubuntu-latest"    "linux/amd64" 1 false
            arch_needed "aarch64"      && add_cfg "aarch64"      "x86_64"      "ubuntu-latest"    "linux/amd64" 0 false
            arch_needed "x86_64-musl"  && add_cfg "x86_64-musl"  "x86_64-musl" "ubuntu-latest"    "linux/amd64" 1 false
            arch_needed "aarch64-musl" && add_cfg "aarch64-musl" "x86_64-musl" "ubuntu-latest"    "linux/amd64" 0 false
            needs_native_aarch64 && add_cfg "aarch64" "aarch64" "ubuntu-24.04-arm" "linux/arm64" 1 true
            [ -z "$matrix_configs" ] && add_cfg "x86_64" "x86_64" "ubuntu-latest" "linux/amd64" 1 false
          fi
          echo "matrix={\"config\":[${matrix_configs}]}" >> "$GITHUB_OUTPUT"

  test-pr:
    name: Test PR changes
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.packages != ''
    runs-on: ${{ matrix.config.runner }}
    container:
      image: ghcr.io/osowoso/oco-builder-${{ matrix.config.host }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: '${{ matrix.config.arch }}'
        BOOTSTRAP: '${{ matrix.config.host }}'
        TEST: '${{ matrix.config.test }}'
        NATIVE: '${{ matrix.config.native }}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Prepare container
        run: |
          xbps-install -Syu xbps
          xbps-install -yu

      - name: Checkout repo (PR head)
        run: |
          git clone "https://github.com/${{ github.repository }}.git" extra
          cd extra
          git fetch --no-tags origin "${{ github.event.pull_request.head.sha }}" --depth 1
          git checkout --detach "${{ github.event.pull_request.head.sha }}"

      - name: Merge templates and edit shlibs
        run: |
          extra/update-shlibs -s /void-packages/common/shlibs

          echo "==> Copying templates..."
          for template in extra/srcpkgs/*; do
            template_name=$(basename "$template")
            rm -rf "/void-packages/srcpkgs/$template_name"
            cp -rv "$template" /void-packages/srcpkgs/
          done
          chown -R builder:builder /void-packages/srcpkgs /void-packages/common

      - name: Lint templates
        if: matrix.config.arch == 'x86_64'
        continue-on-error: true
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          packages="${{ needs.detect.outputs.packages }}"
          cd /void-packages

          for template_name in $packages; do
            echo "==> Linting ${template_name}"
            OUTPUT=$(sudo -Eu builder xlint "${template_name}" 2>&1) || true
            if [ -n "$OUTPUT" ]; then
              echo "❌ ${template_name} lint failed:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "❌ ${template_name}: $OUTPUT"
            else
              echo "✅ ${template_name} lint passed"
            fi
          done

      - name: Build packages
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd /void-packages
          packages="${{ needs.detect.outputs.packages }}"

          arch=""
          cross=false
          if [ "$BOOTSTRAP" != "$ARCH" ]; then
            arch="-a $ARCH"
            case "$ARCH" in aarch64*) cross=true ;; esac
          fi

          if [ "$TEST" = 1 ]; then
            test="-Q"
          fi

          pkg_arch_ok() {
            local pkg="$1" target="$2"
            local template="srcpkgs/${pkg}/template"
            [ -f "$template" ] || return 0
            local archs last="" pat
            archs=$(grep -m1 '^archs=' "$template" | sed 's/^archs=//;s/"//g')
            [ -z "$archs" ] && return 0
            for pat in $archs; do
              last="$pat"
              case "$target" in
                ${pat#~})
                  case "$pat" in ~*) return 1 ;; *) return 0 ;; esac
                  ;;
              esac
            done
            case "$last" in ~*) return 0 ;; esac
            return 1
          }

          echo "==> Resolving dependencies for: $packages"
          PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $packages)

          echo "==> Build order with dependencies:"
          echo "$PKGS"
          echo

          for pkg in ${PKGS}; do
            if ! pkg_arch_ok "$pkg" "${ARCH}"; then
              echo "==> Skipping ${pkg}: not available for ${ARCH}"
              continue
            fi
            if [ "$cross" = "true" ] && grep -q '^nocross=' "srcpkgs/${pkg}/template" 2>/dev/null; then
              echo "==> Skipping ${pkg}: nocross (built natively)"
              continue
            fi
            if [ "$NATIVE" = "true" ] && ! grep -q '^nocross=' "srcpkgs/${pkg}/template" 2>/dev/null; then
              echo "==> Skipping ${pkg}: not nocross (built in cross job)"
              continue
            fi
            echo "==> Building ${pkg}"
            sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"
            echo
          done

  build:
    name: Build and publish packages
    needs: detect
    if: (github.event_name == 'push' || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.packages != ''
    runs-on: ${{ matrix.config.runner }}
    container:
      image: ghcr.io/osowoso/oco-builder-${{ matrix.config.host }}:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --platform ${{ matrix.config.platform }} --privileged
      volumes:
        - /dev:/dev
      env:
        ARCH: '${{ matrix.config.arch }}'
        BOOTSTRAP: '${{ matrix.config.host }}'
        TEST: '${{ matrix.config.test }}'
        NATIVE: '${{ matrix.config.native }}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Prepare container
        run: |
          xbps-install -Syu xbps
          xbps-install -yu

      - name: Checkout this repo
        run: |
          git clone "https://github.com/${{ github.repository }}.git" extra
          cd extra
          git fetch --no-tags origin "${{ github.sha }}" --depth 1
          git checkout --detach "${{ github.sha }}"

      - name: Merge templates and edit shlibs
        run: |
          extra/update-shlibs -s /void-packages/common/shlibs

          echo "==> Copying templates..."
          for template in extra/srcpkgs/*; do
            template_name=$(basename "$template")
            rm -rf "/void-packages/srcpkgs/$template_name"
            cp -rv "$template" /void-packages/srcpkgs/
          done
          chown -R builder:builder /void-packages/srcpkgs /void-packages/common

      - name: Build packages
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          cd /void-packages
          packages="${{ needs.detect.outputs.packages }}"

          arch=""
          cross=false
          if [ "$BOOTSTRAP" != "$ARCH" ]; then
            arch="-a $ARCH"
            case "$ARCH" in aarch64*) cross=true ;; esac
          fi

          if [ "$TEST" = 1 ]; then
            test="-Q"
          fi

          pkg_arch_ok() {
            local pkg="$1" target="$2"
            local template="srcpkgs/${pkg}/template"
            [ -f "$template" ] || return 0
            local archs last="" pat
            archs=$(grep -m1 '^archs=' "$template" | sed 's/^archs=//;s/"//g')
            [ -z "$archs" ] && return 0
            for pat in $archs; do
              last="$pat"
              case "$target" in
                ${pat#~})
                  case "$pat" in ~*) return 1 ;; *) return 0 ;; esac
                  ;;
              esac
            done
            case "$last" in ~*) return 0 ;; esac
            return 1
          }

          echo "==> Resolving dependencies for: $packages"
          PKGS=$(sudo -Eu builder ./xbps-src $test sort-dependencies $packages)

          echo "==> Build order with dependencies:"
          echo "$PKGS"
          echo

          for pkg in ${PKGS}; do
            if ! pkg_arch_ok "$pkg" "${ARCH}"; then
              echo "==> Skipping ${pkg}: not available for ${ARCH}"
              continue
            fi
            if [ "$cross" = "true" ] && grep -q '^nocross=' "srcpkgs/${pkg}/template" 2>/dev/null; then
              echo "==> Skipping ${pkg}: nocross (built natively)"
              continue
            fi
            if [ "$NATIVE" = "true" ] && ! grep -q '^nocross=' "srcpkgs/${pkg}/template" 2>/dev/null; then
              echo "==> Skipping ${pkg}: not nocross (built in cross job)"
              continue
            fi
            echo "==> Building ${pkg}"
            sudo -Eu builder ./xbps-src -j"$(nproc)" -s $arch $test pkg "${pkg}"
            echo
          done

      - name: Sign packages
        env:
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
          XBPS_ARCH: ${{ matrix.config.arch }}
          XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
        working-directory: /void-packages/hostdir/binpkgs/
        run: |
          export PATH="/opt/xbps/usr/bin/:$PATH"
          export XBPS_TARGET_ARCH="${XBPS_ARCH}"

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "⚠️ No packages to sign"
            exit 0
          fi

          echo "==> Merging free + nonfree"
          if [ -d "nonfree" ]; then
            mv nonfree/*.xbps . 2>/dev/null || true
          fi

          echo "==> Writing private key"
          printf "%s\n" "$PRIV_KEY" > private.pem
          chmod 600 private.pem

          echo "==> Signing individual packages"
          xbps-rindex -S --privkey private.pem "$PWD"/*.xbps

          echo "==> Cleaning up private key"
          rm -f private.pem

      - name: Upload
        working-directory: /void-packages/hostdir/binpkgs
        env:
          ARCH: ${{ matrix.config.arch }}
          XBPS_ARCH: ${{ matrix.config.arch }}
          XBPS_TARGET_ARCH: ${{ matrix.config.arch }}
          PRIV_KEY: ${{ secrets.PRIV_KEY }}
          SURFER_TOKEN: ${{ secrets.SURFER_TOKEN }}
          REMOVED: ${{ needs.detect.outputs.removed }}
        run: |
          export XBPS_TARGET_ARCH="${XBPS_ARCH}"
          export PATH="/opt/xbps/usr/bin/:$PATH"
          "${GITHUB_WORKSPACE}/extra/surfer-upload"
          echo "Added to https://repo.osowoso.org/${ARCH}/" >> $GITHUB_STEP_SUMMARY
